server {
    server_name quantlife.site quant.quantlife.site;

    root /var/www/quant-website;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /data/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        add_header Cache-Control "private, no-store" always;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(index|watchlist|picks|holdings|performance|strategy|etf|crypto|small-cap|breadth|sentiment|macro)\.html$ {
        add_header Cache-Control "private, no-store" always;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /login.html {
        add_header Cache-Control "no-store" always;
        try_files /login.html =404;
    }

    location = /styles.css {
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
        try_files /styles.css =404;
    }

    location = /login.js {
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
        try_files /login.js =404;
    }

    location /src/ {
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    location /assets/ {
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    location = /favicon.ico {
        try_files /favicon.ico =404;
    }

    location / {
        add_header Cache-Control "private, no-store" always;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/quantlife.site/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/quantlife.site/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = quant.quantlife.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = quantlife.site) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80 default_server;
    listen [::]:80 default_server;
    server_name quantlife.site quant.quantlife.site;
    return 404; # managed by Certbot
}
